<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunのパン工房</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-orange-800 mb-6 text-center">🍞 Bunのパン工房</h1>

        <div id="finishOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-white p-8 rounded-3xl text-center shadow-2xl max-w-xs w-full">
                <div class="text-6xl mb-4">🔔</div>
                <p class="text-xl font-bold text-orange-900 mb-6">時間だよ！</p>
                <button onclick="dismissAlarm()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-2xl text-lg hover:bg-orange-700 transition">OK</button>
            </div>
        </div>

        <div class="flex items-end gap-2 mb-3">
            <label class="block text-sm font-bold text-orange-900">レシピを選ぶ</label>
            <span class="text-[10px] text-orange-500 font-medium">← 横にスワイプ →</span>
        </div>
        
        <div id="recipeCards" class="flex overflow-x-auto space-x-4 pb-4 px-2 mb-6 snap-x">
            <p class="text-orange-500">読み込み中...</p>
        </div>

        <div id="recipeImageContainer" class="mb-6 hidden bg-white p-2 rounded-2xl shadow-inner">
            <img id="recipeImage" src="" alt="レシピ写真" class="w-full h-64 object-cover rounded-2xl shadow-md">
        </div>

        <div class="bg-orange-100 p-5 rounded-2xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm text-orange-800">元レシピの個数: <span id="baseCountDisplay" class="font-bold text-orange-950">0</span></span>
            </div>
            <label class="block text-sm font-bold text-orange-900 mb-2">作りたい個数</label>
            <input type="number" id="targetCount" value="4" oninput="calculate()" class="w-full p-4 rounded-xl border-2 border-orange-300 text-3xl font-bold text-center text-orange-900 focus:outline-none focus:border-orange-500">
        </div>

        <div id="ingredientList" class="space-y-2"></div>

        <div id="timerContainer" class="hidden my-6 p-4 bg-orange-800 rounded-2xl text-center text-white shadow-lg">
            <div class="text-xs font-bold opacity-80">残り時間</div>
            <div id="timerDisplay" class="text-4xl font-black my-1 tabular-nums">00:00</div>
            <button onclick="stopTimer()" class="text-xs bg-orange-700 hover:bg-orange-600 px-4 py-1 rounded-full mt-2 transition">停止</button>
        </div>

        <h3 id="procedureTitle" class="font-bold text-orange-900 mt-8 mb-2 hidden">作り方</h3>
        <div id="procedureList" class="text-sm text-orange-800 space-y-2"></div>
    </div>

    <script>
        let allRecipes = {};
        let currentRecipeKey = ""; 
        let timerInterval;
        // 音源の設定
        const alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPf6aGtE_j5qRRLuV6tjJ8aMOjaRQfBri3kOsDJ9dmteRgSuQ_7Kerizpi-X79eUaF/exec';

        async function fetchRecipes() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                data.sort((a, b) => a.menu.localeCompare(b.menu, 'ja'));

                const container = document.getElementById('recipeCards');
                container.innerHTML = '';
                allRecipes = {};

                data.forEach(item => {
                    let cleanMenu = String(item.menu).replace(/[\s\u3000]+/g, "").trim();
                    allRecipes[cleanMenu] = item;

                    const card = document.createElement('div');
                    card.className = "flex-shrink-0 w-40 h-20 snap-start cursor-pointer transition-transform hover:scale-105 my-1";
                    card.innerHTML = `
                        <div class="bg-orange-100 rounded-xl p-2 h-full flex items-center justify-center border-2 border-transparent hover:border-orange-500 hover:shadow-md">
                            <p class="text-xs font-bold text-orange-900 text-center leading-tight break-words">${cleanMenu}</p>
                        </div>
                    `;
                    card.onclick = () => selectRecipe(cleanMenu);
                    container.appendChild(card);
                });
                
                if (data.length > 0) selectRecipe(String(data[0].menu).replace(/[\s\u3000]+/g, "").trim());
            } catch (e) {
                console.error(e);
                document.getElementById('recipeCards').innerHTML = '<p class="text-red-500">読み込み失敗...</p>';
            }
        }

        function selectRecipe(key) {
            currentRecipeKey = key;
            stopTimer();
            loadRecipe();
        }

        function loadRecipe() {
            const recipe = allRecipes[currentRecipeKey];
            if (!recipe) return;

            const imgContainer = document.getElementById('recipeImageContainer');
            const img = document.getElementById('recipeImage');
            if (recipe.image) {
                img.src = "https://lh3.googleusercontent.com/d/" + recipe.image;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            document.getElementById('targetCount').value = recipe.baseCount;
            document.getElementById('baseCountDisplay').innerText = recipe.baseCount;

            const procContainer = document.getElementById('procedureList');
            const procTitle = document.getElementById('procedureTitle');
            procContainer.innerHTML = '';
            
            if (recipe.procedures && recipe.procedures.length > 0) {
                procTitle.classList.remove('hidden');
                recipe.procedures.forEach(s => {
                    procContainer.innerHTML += `<h4 class="font-bold text-orange-950 mt-4">【${s.section}】</h4>`;
                    s.steps.forEach((step, i) => {
                        const linkedStep = step.replace(/(\d+)[\s\u3000\n]*分(?![割の])/g, (match, p1) => {
                            return `<button onclick="startTimer(${p1})" class="bg-orange-200 hover:bg-orange-300 text-orange-900 px-2 py-0.5 rounded-md font-bold transition underline decoration-orange-400">${p1}分</button>`;
                        });
                        procContainer.innerHTML += `<div class="text-sm py-1"><b>${i+1}.</b> ${linkedStep}</div>`;
                    });
                });
            } else {
                procTitle.classList.add('hidden');
            }
            calculate();
        }

        function startTimer(minutes) {
            stopTimer();
            const container = document.getElementById('timerContainer');
            const display = document.getElementById('timerDisplay');
            container.classList.remove('hidden');
            
            let seconds = minutes * 60;
            display.innerText = `${String(minutes).padStart(2, '0')}:00`;
            
            timerInterval = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    // 完了時の通知（オーバーレイ表示＋音＋振動）
                    document.getElementById('finishOverlay').classList.remove('hidden');
                    alarmAudio.play().catch(e => console.log("再生エラー:", e));
                    if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000]);
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            document.getElementById('timerContainer').classList.add('hidden');
        }

        function dismissAlarm() {
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            document.getElementById('finishOverlay').classList.add('hidden');
            document.getElementById('timerContainer').classList.add('hidden');
        }

        function calculate() {
            const targetCount = document.getElementById('targetCount').value;
            const recipe = allRecipes[currentRecipeKey];
            if (!recipe) return;
            const container = document.getElementById('ingredientList');
            container.innerHTML = '';
            
            if(recipe.ingredients && recipe.ingredients.base) {
                recipe.ingredients.base.forEach(item => {
                    const amountStr = item.amount.toString();
                    const match = amountStr.match(/([\d\.]+)/);
                    const val = match ? (parseFloat(match[1]) * targetCount) / recipe.baseCount : 0;
                    const display = match ? val.toFixed(1).replace('.0','') + amountStr.replace(match[1], "") : amountStr;
                    container.innerHTML += `<div class="flex justify-between py-1 border-b border-orange-100"><span>${item.name}</span><span class="font-bold text-orange-900">${display}</span></div>`;
                });
            }
        }

        fetchRecipes();
    </script>
</body>
</html>
