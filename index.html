<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>対義語サバイバル - 全国ランキング版</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .shining-text {
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
        }
        .btn-press {
            transition: transform 0.1s;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        canvas {
            image-rendering: pixelated;
        }
        .version-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        .version-btn img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="game-container" class="relative w-full max-w-md mx-auto h-[100dvh] bg-slate-900/50 shadow-2xl overflow-hidden flex flex-col">
        
        <!-- UI Overlay -->
        <div id="ui-layer" class="absolute inset-0 z-10 pointer-events-none"></div>
        
        <!-- Main Menu -->
        <div id="menu-screen" class="absolute inset-0 z-20 flex flex-col items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
            <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-emerald-300 to-emerald-600 shining-text">対義語</h1>
            <h1 class="text-4xl font-black mb-12 text-transparent bg-clip-text bg-gradient-to-b from-emerald-400 to-emerald-700 shining-text">サバイバル</h1>
            
            <div class="space-y-6 w-full max-w-xs pointer-events-auto">
                <button onclick="showVersionSelection('stage')" class="btn-press w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-3xl font-black text-2xl shadow-lg border-b-4 border-teal-800 text-white">
                    ステージモード
                </button>
                <button onclick="showVersionSelection('endless')" class="btn-press w-full py-5 bg-gradient-to-r from-amber-500 to-orange-600 rounded-3xl font-black text-2xl shadow-lg border-b-4 border-orange-800 text-white">
                    エンドレス
                </button>
                <button onclick="showRanking()" class="btn-press w-full py-4 bg-slate-700/80 rounded-3xl font-bold text-xl shadow-md text-slate-200">
                    全国ランキング
                </button>
                <button onclick="showInstallInfo()" class="btn-press w-full py-4 bg-slate-800/60 rounded-3xl font-bold text-lg shadow-md text-slate-400">
                    インストール方法
                </button>
            </div>
        </div>

        <!-- Version Selection -->
        <div id="version-screen" class="absolute inset-0 z-30 hidden flex flex-col items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
            <h2 id="version-title" class="text-3xl font-black mb-12 text-emerald-400">バージョンを選択</h2>
            
            <div id="version-buttons" class="grid grid-cols-1 gap-8 w-full max-w-xs pointer-events-auto">
                <!-- ここに画像ボタンが生成される -->
            </div>
            
            <button onclick="backToMenu()" class="mt-12 text-slate-400 font-bold text-lg hover:text-white">
                戻る
            </button>
        </div>

        <!-- Ranking Screen -->
        <div id="ranking-screen" class="absolute inset-0 z-40 hidden flex flex-col p-4 bg-slate-900/95">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-emerald-400">全国ランキング</h2>
                <button onclick="closeRanking()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <div id="ranking-content" class="flex-1 overflow-y-auto space-y-2 pr-2">
                <!-- Ranking items here -->
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const API_URL = "https://script.google.com/macros/s/AKfycbwpwalZph2UDQA8L6ojCNygSyUmbzziO9SutgfUGLJKl6Ak_Kxda5FFnC1VyeBQT8De8g/exec"; // ユーザーが後で更新
        
        let currentMode = ''; 
        let currentVersion = '';

        function showVersionSelection(mode) {
            currentMode = mode;
            const screen = document.getElementById('version-screen');
            const title = document.getElementById('version-title');
            const btnContainer = document.getElementById('version-buttons');
            
            title.textContent = mode === 'stage' ? 'ステージモードを選択' : 'エンドレスモードを選択';
            
            // ボタンを画像化して生成
            if (mode === 'stage') {
                btnContainer.innerHTML = `
                    <button onclick="startGame('stage', 'old')" class="version-btn btn-press">
                        <img src="st1.png" alt="ステージモード(旧)">
                    </button>
                    <button onclick="startGame('stage', 'new')" class="version-btn btn-press">
                        <img src="st2.png" alt="ステージモード(新)">
                    </button>
                `;
            } else {
                btnContainer.innerHTML = `
                    <button onclick="startGame('endless', 'old')" class="version-btn btn-press">
                        <img src="ed1.png" alt="エンドレスモード(旧)">
                    </button>
                    <button onclick="startGame('endless', 'new')" class="version-btn btn-press">
                        <img src="ed2.png" alt="エンドレスモード(新)">
                    </button>
                `;
            }
            
            document.getElementById('menu-screen').classList.add('hidden');
            screen.classList.remove('hidden');
        }

        function backToMenu() {
            document.getElementById('version-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function startGame(mode, version) {
            currentMode = mode;
            currentVersion = version;
            document.getElementById('version-screen').classList.add('hidden');
            console.log(`Starting ${mode} mode, version: ${version}`);
            // ゲーム開始ロジック（実際の実装ではここで初期化などを行う）
        }

        function showRanking() {
            document.getElementById('ranking-screen').classList.remove('hidden');
            fetchRanking();
        }

        function closeRanking() {
            document.getElementById('ranking-screen').classList.add('hidden');
        }

        async function fetchRanking() {
            // ランキング取得ロジック（GAS連携）
        }

        function showInstallInfo() {
            alert("ブラウザのメニューから『ホーム画面に追加』を選択してください。");
        }

        // 初期化処理
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 描画ループなど
        }
        
        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
