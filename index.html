<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>対義語サバイバル - 全国ランキング版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            touch-action: manipulation;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        #game-container { min-height: 100vh; display: flex; flex-direction: column; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .logo-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* 真鍮風ボタンのスタイル */
        .choice-btn {
            background: linear-gradient(145deg, #b8860b, #8b4513) !important;
            border: 3px solid #5d4037 !important;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.3), 0 4px 6px rgba(0,0,0,0.5) !important;
            color: #fff8e1 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important;
            border-radius: 8px !important;
            position: relative;
            overflow: hidden;
        }
        .choice-btn::before, .choice-btn::after {
            content: ""; position: absolute; width: 6px; height: 6px;
            background: #5d4037; border-radius: 50%; opacity: 0.6;
        }
        .choice-btn::before { top: 5px; left: 5px; }
        .choice-btn::after { bottom: 5px; right: 5px; }
        
        #question-container {
            background: rgba(253, 245, 230, 0.6) !important;
            border: 6px double #d4af37 !important;
            position: relative !important;
            overflow: hidden !important; 
            z-index: 5 !important;
        }
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .gear-final {
            position: absolute !important; z-index: 6 !important;
            fill: #b8860b !important; opacity: 0.6 !important;
            pointer-events: none; animation: gear-spin 10s linear infinite;
        }
        .feedback-pop {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
            animation: feedbackAnim 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }
        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -55%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); }
        }
    </style>
</head>
<body>
    <div id="game-container" class="w-full relative overflow-hidden">
        <div class="absolute top-4 left-4 z-50 text-[10px] font-mono text-slate-500 tracking-widest pointer-events-none">VER 5.0 Dual Stage System</div>
        
        <div id="title-screen" class="flex-grow flex flex-col items-center justify-between text-center py-10 px-8 fade-in relative z-10">
            <div class="w-full flex justify-end">
                <button onclick="toggleMute()" class="p-3 bg-slate-800/90 rounded-full text-slate-400 border border-slate-700">
                    <svg id="title-volume-on" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95" /></svg>
                    <svg id="title-volume-off" class="h-6 w-6 hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12" /></svg>
                </button>
            </div>
            <div class="flex-grow flex items-center justify-center w-full">
                <img src="logo.png" alt="対義語サバイバル" class="max-w-[280px] logo-float drop-shadow-[0_0_20px_rgba(52,211,153,0.3)]">
            </div>
            <div class="w-full max-w-xs space-y-4 mb-6">
                <button onclick="showInstruction('stage')" class="w-full active:scale-95 transition-all">
                    <img src="stm.png" alt="ステージモード" class="w-full drop-shadow-lg">
                </button>
                <button onclick="showInstruction('endless')" class="w-full active:scale-95 transition-all">
                    <img src="endless.png" alt="エンドレスモード" class="w-full drop-shadow-lg">
                </button>
            </div>
        </div>

        <div id="mode-select-screen" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 class="text-3xl font-black text-white mb-8">モードを選択</h2>
            <div id="mode-buttons-container" class="grid grid-cols-2 gap-4 w-full max-w-sm">
                </div>
            <button onclick="backToTitle()" class="mt-8 text-slate-500 font-bold">戻る</button>
        </div>

        <div id="instruction-screen" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 id="inst-title" class="text-4xl font-black mb-8"></h2>
            <div id="inst-body" class="bg-slate-900/80 rounded-3xl p-8 border-2 text-slate-200 space-y-6 mb-10 w-full max-w-sm shadow-2xl backdrop-blur-md"></div>
            <button onclick="goToModeSelect()" class="w-full max-w-xs py-5 bg-slate-700 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95">次へ進む</button>
        </div>

        <div id="nickname-screen" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 class="text-3xl font-black text-white mb-8">ニックネームを入力</h2>
            <input type="text" id="player-name" maxlength="10" placeholder="なまえ" class="w-full max-w-xs py-4 px-6 rounded-2xl bg-slate-800 border-2 border-slate-700 text-white text-2xl text-center focus:outline-none focus:border-emerald-500 mb-6">
            <button onclick="initialStart()" class="w-full max-w-xs py-5 bg-emerald-600 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95">開始！</button>
        </div>

        <div id="game-screen" class="hidden flex-grow flex flex-col p-4 relative">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="text-emerald-400 font-black text-xl">第 <span id="q-num" class="text-3xl">1</span> / <span id="total-q-num">60</span> 問</div>
                <div class="text-slate-400 font-bold text-lg">SCORE: <span id="total-score" class="text-white">0</span></div>
            </div>
            
            <div id="question-container" class="w-full aspect-video rounded-2xl flex items-center justify-center mb-8 shadow-inner">
                <svg class="gear-final w-24 h-24 -top-8 -left-8" viewBox="0 0 100 100"><path d="M50 30c-11 0-20 9-20 20s9 20 20 20 20-9 20-20-9-20-20-20zm0 32c-6.6 0-12-5.4-12-12s5.4-12 12-12 12 5.4 12 12-5.4 12-12 12z"/></svg>
                <div id="question-word" class="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter"></div>
            </div>

            <div id="choices-grid" class="grid grid-cols-1 gap-4 w-full max-w-md mx-auto">
                </div>
        </div>

        <div id="overlay" class="hidden fixed inset-0 bg-slate-950/95 z-[100] flex flex-col p-6 overflow-y-auto">
            <div id="result-content" class="w-full max-w-md mx-auto text-center space-y-6 py-10">
                </div>
        </div>
    </div>
<script>
    // ユーザー指定のGAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwpwalZph2UDQA8L6ojCNygSyUmbzziO9SutgfUGLJKl6Ak_Kxda5FFnC1VyeBQT8De8g/exec";
    
    let currentCategory = 'stage'; 
    let currentMode = ''; // stage1, stage2, endless1, endless2
    let playerName = "";
    let score = 0;
    let qIndex = 0;
    let gameActive = false;
    let qStartTime = 0;
    let questions = [];

    const MODE_CONFIG = {
        stage1: { img: 'st1.png', title: 'ステージ vol.1', isEndless: false },
        stage2: { img: 'st2.png', title: 'ステージ vol.2', isEndless: false },
        endless1: { img: 'ed1.png', title: 'エンドレス vol.1', isEndless: true },
        endless2: { img: 'ed2.png', title: 'エンドレス vol.2', isEndless: true }
    };

    function showInstruction(cat) {
        currentCategory = cat;
        document.getElementById('title-screen').classList.add('hidden');
        const screen = document.getElementById('instruction-screen');
        const title = document.getElementById('inst-title');
        const body = document.getElementById('inst-body');
        screen.classList.remove('hidden');
        
        if(cat === 'stage') {
            title.textContent = "遊び方";
            title.className = "text-4xl font-black text-emerald-400 mb-8";
            body.innerHTML = `
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0">1</span><p>対義語を4択から選んでください。</p></div>
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0">2</span><p>全60問。1問のミスで即終了です。</p></div>
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0">3</span><p>速度に応じてボーナス加算！</p></div>`;
        } else {
            title.textContent = "エンドレス";
            title.className = "text-4xl font-black text-blue-400 mb-8";
            body.innerHTML = `
                <div class="flex items-start gap-4"><span class="bg-blue-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0">1</span><p>対義語を4択から選んでください。</p></div>
                <div class="flex items-start gap-4"><span class="bg-blue-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0">2</span><p>全200問をランダムに出題します。</p></div>`;
        }
    }

    function goToModeSelect() {
        document.getElementById('instruction-screen').classList.add('hidden');
        const container = document.getElementById('mode-buttons-container');
        container.innerHTML = '';
        
        const modes = currentCategory === 'stage' ? ['stage1', 'stage2'] : ['endless1', 'endless2'];
        modes.forEach(m => {
            const btn = document.createElement('button');
            btn.className = "active:scale-95 transition-all";
            btn.onclick = () => selectMode(m);
            btn.innerHTML = `<img src="${MODE_CONFIG[m].img}" alt="${MODE_CONFIG[m].title}" class="w-full drop-shadow-lg">`;
            container.appendChild(btn);
        });
        document.getElementById('mode-select-screen').classList.remove('hidden');
    }

    function selectMode(m) {
        currentMode = m;
        document.getElementById('mode-select-screen').classList.add('hidden');
        document.getElementById('nickname-screen').classList.remove('hidden');
    }

    function getQuestionSet() {
        // 1なら旧、2なら新のデータを使用
        const source = (currentMode.endsWith('1')) ? DATA_OLD : DATA_NEW;
        
        if (MODE_CONFIG[currentMode].isEndless) {
            const all = [...source.elementary, ...source.intermediate, ...source.advanced, ...source.extra];
            return all.sort(() => Math.random() - 0.5).slice(0, 200);
        } else {
            // ステージモードは各難易度15問ずつ（全60問）
            return [
                ...source.elementary.sort(() => Math.random() - 0.5).slice(0, 15),
                ...source.intermediate.sort(() => Math.random() - 0.5).slice(0, 15),
                ...source.advanced.sort(() => Math.random() - 0.5).slice(0, 15),
                ...source.extra.sort(() => Math.random() - 0.5).slice(0, 15)
            ];
        }
    }
function initialStart() {
        const input = document.getElementById('player-name').value.trim();
        if(!input) return alert("名前を入力してください");
        playerName = input;
        document.getElementById('nickname-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        questions = getQuestionSet();
        document.getElementById('total-q-num').textContent = questions.length;
        score = 0;
        qIndex = 0;
        gameActive = true;
        nextQuestion();
    }

    function nextQuestion() {
        if(qIndex >= questions.length) return endGame(true);
        const q = questions[qIndex];
        qStartTime = Date.now();
        
        document.getElementById('q-num').textContent = qIndex + 1;
        document.getElementById('question-word').textContent = q.q;
        document.getElementById('total-score').textContent = Math.floor(score);
        
        const choices = [q.a, ...q.d].sort(() => Math.random() - 0.5);
        const grid = document.getElementById('choices-grid');
        grid.innerHTML = '';
        choices.forEach(text => {
            const btn = document.createElement('button');
            btn.className = "choice-btn w-full py-5 text-2xl font-black";
            btn.textContent = text;
            btn.onclick = () => checkAnswer(text);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if(!gameActive) return;
        const q = questions[qIndex];
        const isCorrect = (selected === q.a);
        
        if(isCorrect) {
            const elapsed = (Date.now() - qStartTime) / 1000;
            let bonus = Math.max(1, 10 - elapsed);
            score += 100 * bonus;
            showFeedback(true);
            qIndex++;
            setTimeout(nextQuestion, 600);
        } else {
            gameActive = false;
            showFeedback(false);
            setTimeout(() => endGame(false), 800);
        }
    }

  async function endGame() {
        isGameActive = false;
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const finalScore = Math.floor(score);
        document.getElementById('final-score').textContent = finalScore;

        // --- ここから称号生成の差し替え ---
        const rank = TITLES_CONFIG.getRank(finalScore); // スコアからランク（A〜E）を判定
        const listA = TITLES_CONFIG.wordA[rank];      // そのランクの形容詞リスト
        const listB = TITLES_CONFIG.wordB[rank];      // そのランクの名詞リスト
        
        // ランダムに1つずつ選ぶ
        const wordA = listA[Math.floor(Math.random() * listA.length)];
        const wordB = listB[Math.floor(Math.random() * listB.length)];
        
        const titleName = wordA + wordB; // つなげて称号にする
        document.getElementById('player-title').textContent = titleName;
        // --- ここまで ---

        // ランキング送信（既存の処理）
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    name: playerName,
                    score: finalScore,
                    mode: currentMode
                })
            });
            const rankData = await response.json();
            displayRanking(rankData);
        } catch (e) {
            console.error("Ranking Error", e);
        }
    }
    function showFeedback(correct) {
        const div = document.createElement('div');
        div.className = "feedback-pop text-8xl font-black";
        div.textContent = correct ? "○" : "×";
        div.style.color = correct ? "#10b981" : "#ef4444";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function displayRanking(data) {
        const list = document.getElementById('ranking-list');
        let html = '<h3 class="text-center font-bold mb-4">全国ランキング</h3><table class="w-full text-sm"><tr><th class="p-2">順位</th><th class="p-2">名前</th><th class="p-2 text-right">スコア</th></tr>';
        data.forEach(r => {
            html += `<tr class="${r.name === playerName ? 'bg-emerald-900/40 text-emerald-400' : ''}">
                        <td class="p-2 text-center">${r.rank}</td>
                        <td class="p-2">${r.name}</td>
                        <td class="p-2 text-right">${r.score}</td>
                    </tr>`;
        });
        list.innerHTML = html + '</table>';
    }

    function toggleMute() { /* 任意の実装 */ }
    function backToTitle() { location.reload(); }
// --- 称号用単語データ ---
// --- 称号生成用データ ---

        if (score >= 5000)  return 'C';

    wordB: {
