<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunのパン工房</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="orange">
    <meta name="apple-mobile-web-app-title" content="Bunのパン工房">
</head>
<body class="bg-orange-50 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6">
        <button id="installBtn" class="w-full bg-orange-600 text-white font-bold py-2 rounded-lg mb-4 hidden">
            📱 アプリとしてインストールする
        </button>

        <h1 class="text-2xl font-bold text-orange-800 mb-6 text-center">🍞 Bunのパン工房</h1>

        <div class="mb-6">
            <label class="block text-sm font-bold text-orange-900 mb-2">レシピを選ぶ</label>
            <select id="recipeSelect" onchange="loadRecipe()" class="w-full p-3 rounded-xl border border-orange-200 bg-orange-50 font-bold text-orange-900">
                <option>読み込み中...</option>
            </select>
        </div>

        <div id="recipeImageContainer" class="mb-6 hidden">
            <img id="recipeImage" src="" alt="レシピ写真" class="w-full h-64 object-cover rounded-2xl shadow-md">
        </div>

        <div class="bg-orange-100 p-5 rounded-2xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm text-orange-800">元レシピの個数: <span id="baseCountDisplay" class="font-bold text-orange-950">0</span></span>
            </div>
            
            <label class="block text-sm font-bold text-orange-900 mb-2">作りたい個数（ここを変更！）</label>
            <input type="number" id="targetCount" value="4" oninput="calculate()" class="w-full p-4 rounded-xl border-2 border-orange-300 text-3xl font-bold text-center text-orange-900 focus:outline-none focus:border-orange-500">
        </div>

        <div id="ingredientList" class="space-y-2"></div>

        <h3 id="procedureTitle" class="font-bold text-orange-900 mt-8 mb-2 hidden">作り方</h3>
        <div id="procedureList" class="text-sm text-orange-800 space-y-2"></div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const installBtn = document.getElementById('installBtn');
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile && !isStandalone) {
                installBtn.classList.remove('hidden');
            }

            installBtn.addEventListener('click', () => {
                if (isIOS) {
                    alert("iPhoneの方：画面上または下の『共有ボタン』を押して、『ホーム画面に追加』を選んでね！");
                } else {
                    alert("Androidの方：ブラウザの『メニュー』から『アプリをインストール』を選んでね！");
                }
            });
        });

        let allRecipes = {};
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPf6aGtE_j5qRRLuV6tjJ8aMOjaRQfBri3kOsDJ9dmteRgSuQ_7Kerizpi-X79eUaF/exec';

        async function fetchRecipes() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const select = document.getElementById('recipeSelect');
                select.innerHTML = '';
                const seenMenus = new Set();
                
                data.forEach(item => {
                    let cleanMenu = String(item.menu).replace(/[\s\u3000]+/g, "").trim();
                    if (!seenMenus.has(cleanMenu)) {
                        allRecipes[cleanMenu] = item;
                        allRecipes[cleanMenu].menu = cleanMenu;
                        const option = document.createElement('option');
                        option.value = cleanMenu;
                        option.text = cleanMenu;
                        select.appendChild(option);
                        seenMenus.add(cleanMenu);
                    }
                });
                loadRecipe();
            } catch (e) { console.error(e); }
        }

        function loadRecipe() {
            const key = document.getElementById('recipeSelect').value;
            const recipe = allRecipes[key];
            if (!recipe) return;

            // 画像を表示する処理
            const imgContainer = document.getElementById('recipeImageContainer');
            const img = document.getElementById('recipeImage');
            if (recipe.image && recipe.image.startsWith('http')) {
                img.src = recipe.image;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            document.getElementById('targetCount').value = recipe.baseCount;
            document.getElementById('baseCountDisplay').innerText = recipe.baseCount;
            
            // 手順の表示処理はそのまま
            const procContainer = document.getElementById('procedureList');
            const procTitle = document.getElementById('procedureTitle');
            procContainer.innerHTML = '';
            
            if (recipe.procedures && recipe.procedures.length > 0) {
                procTitle.classList.remove('hidden');
                recipe.procedures.forEach(sectionData => {
                    const h4 = document.createElement('h4');
                    h4.className = "font-bold text-orange-950 mt-4 mb-1";
                    h4.innerText = "【" + sectionData.section + "】";
                    procContainer.appendChild(h4);
                    
                    let stepCounter = 0;
                    sectionData.steps.forEach(step => {
                        if (!step || step.trim() === "") return;
                        if (step.includes("【") && step.includes("】")) {
                            const subTitle = document.createElement('div');
                            subTitle.className = "font-bold text-orange-900 mt-3 mb-1";
                            subTitle.innerText = step;
                            procContainer.appendChild(subTitle);
                        } else {
                            stepCounter++;
                            const div = document.createElement('div');
                            div.className = "text-sm text-orange-800 ml-2 mb-1 flex";
                            div.innerHTML = `<span class="font-bold mr-2 shrink-0">${stepCounter}.</span><span>${step.replace(/\n/g, '<br>')}</span>`;
                            procContainer.appendChild(div);
                        }
                    });
                });
            } else {
                procTitle.classList.add('hidden');
            }
            calculate();
        }

        function calculate() {
            const targetCount = document.getElementById('targetCount').value;
            const recipe = allRecipes[document.getElementById('recipeSelect').value];
            if (!recipe) return;
            const container = document.getElementById('ingredientList');
            container.innerHTML = '';
            renderSection(container, recipe, "生地用", recipe.ingredients.base, targetCount);
            renderSection(container, recipe, "具材", recipe.ingredients.filling, targetCount);
            renderSection(container, recipe, "茹でる用", recipe.ingredients.boiling, targetCount);
        }

        function renderSection(container, recipe, title, ingredients, targetCount) {
            if (!ingredients || ingredients.length === 0) return;
            addCategoryTitle(container, title);
            ingredients.forEach(item => {
                const amountStr = item.amount.toString();
                const match = amountStr.match(/([\d\.]+)/);
                const isExcluded = ["はちみつ", "お湯", "サラダ油", "パン粉", "水"].includes(item.name) || amountStr.includes("適量") || amountStr.includes("cm") || amountStr.includes("たっぷり");
                
                if (match && !isExcluded) {
                    const baseValue = parseFloat(match[1]);
                    const result = (baseValue * targetCount) / recipe.baseCount;
                    let unit = amountStr.replace(match[1], "").trim();
                    let displayAmount = result % 1 === 0 ? result.toFixed(0) : result.toFixed(1);
                    if (unit.includes("大さじ") || unit.includes("小さじ")) {
                        appendRow(container, item.name, unit + displayAmount, "");
                    } else {
                        appendRow(container, item.name, displayAmount, unit);
                    }
                } else {
                    appendRow(container, item.name, amountStr, "");
                }
            });
        }

        function appendRow(container, name, amount, unit = "g") {
            const div = document.createElement('div');
            div.className = "flex justify-between py-2 border-b border-orange-100 text-sm";
            div.innerHTML = `<span>${name}</span><span class="font-bold text-orange-900">${amount}${unit || ""}</span>`;
            container.appendChild(div);
        }

        function addCategoryTitle(container, titleText) {
            const h3 = document.createElement('h3');
            h3.className = "font-bold text-orange-900 mt-4 mb-2";
            h3.innerText = titleText;
            container.appendChild(h3);
        }

        fetchRecipes();
    </script>
</body>
</html>
