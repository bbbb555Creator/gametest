<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>対義語サバイバル - 全国ランキング版</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            touch-action: manipulation;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 現行のボタンデザインを維持 */
        .choice-btn {
            background: linear-gradient(145deg, #b8860b, #8b4513) !important;
            border: 3px solid #5d4037 !important;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.3), 0 4px 6px rgba(0,0,0,0.5) !important;
            color: #fff8e1 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important;
            border-radius: 8px !important;
            position: relative;
            overflow: hidden;
        }
        .choice-btn::before, .choice-btn::after {
            content: ""; position: absolute; width: 6px; height: 6px;
            background: #5d4037; border-radius: 50%; opacity: 0.6;
        }
        .choice-btn::before { top: 5px; left: 5px; }
        .choice-btn::after { bottom: 5px; right: 5px; }

        #question-container {
            background: rgba(253, 245, 230, 0.6) !important;
            border: 6px double #d4af37 !important;
            position: relative !important;
        }

        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .gear-final {
            position: absolute !important; fill: #b8860b !important; opacity: 0.6 !important;
            pointer-events: none; animation: gear-spin 10s linear infinite;
        }

        .feedback-pop {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
            animation: feedbackAnim 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }
        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -55%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="ts" class="flex-grow flex flex-col items-center justify-between text-center py-10 px-8 fade-in relative z-10">
        <div class="w-full flex justify-end gap-2">
            <button onclick="showInstall()" class="p-4 bg-slate-800/90 rounded-full text-slate-400 border border-slate-700 active:scale-90">
                <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            </button>
        </div>
        <div class="flex-grow flex items-center justify-center w-full">
            <img src="logo.png" alt="対義語サバイバル" class="max-w-[300px] logo-float drop-shadow-[0_0_20px_rgba(52,211,153,0.3)]">
        </div>
        <div class="w-full max-w-xs space-y-5 mb-10">
            <button onclick="showInst('stage')" class="w-full active:scale-95 transition-all">
                <img src="stm.png" alt="ステージモード" class="w-full drop-shadow-xl">
            </button>
            <button onclick="showInst('endless')" class="w-full active:scale-95 transition-all">
                <img src="endless.png" alt="エンドレスモード" class="w-full drop-shadow-xl">
            </button>
        </div>
    </div>

    <div id="is" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
        <h2 id="it" class="text-5xl font-black mb-10"></h2>
        <div id="ib" class="bg-slate-900/80 rounded-[40px] p-10 border-2 text-slate-200 space-y-8 mb-12 w-full max-w-sm shadow-2xl backdrop-blur-md text-lg"></div>
        <button onclick="showVolSel()" class="w-full max-w-xs py-7 bg-emerald-600 rounded-3xl text-white font-black text-3xl shadow-xl active:scale-95">次へ進む</button>
    </div>

    <div id="vs" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in text-center">
        <h2 class="text-4xl font-black text-white mb-10">問題セットを選択</h2>
        <div id="vbc" class="grid grid-cols-1 gap-6 w-full max-w-xs mb-12"></div>
        <button onclick="location.reload()" class="text-slate-500 font-bold text-xl">戻る</button>
    </div>

    <div id="ns" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in text-center">
        <h2 class="text-4xl font-black text-white mb-10">ニックネームを入力</h2>
        <input type="text" id="pn" maxlength="10" placeholder="なまえ" class="w-full max-w-xs py-6 px-8 rounded-3xl bg-slate-800 border-4 border-slate-700 text-white text-3xl text-center focus:outline-none focus:border-emerald-500 mb-10 shadow-inner">
        <button onclick="startGame()" class="w-full max-w-xs py-7 bg-emerald-600 rounded-3xl text-white font-black text-3xl shadow-xl active:scale-95">開始！</button>
    </div>

    <div id="gs" class="hidden flex-grow flex flex-col p-4 relative">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="text-emerald-400 font-black text-2xl tracking-wider">第 <span id="qn" class="text-4xl">1</span> 問</div>
            <div class="text-slate-400 font-bold text-xl">SCORE: <span id="ts-score" class="text-white font-mono">0</span></div>
        </div>
        <div id="question-container" class="w-full aspect-video rounded-3xl flex items-center justify-center mb-10 shadow-2xl relative overflow-hidden">
            <svg class="gear-final w-24 h-24 -top-8 -left-8" viewBox="0 0 100 100"><path d="M50 30c-11 0-20 9-20 20s9 20 20 20 20-9 20-20-9-20-20-20zm0 32c-6.6 0-12-5.4-12-12s5.4-12 12-12 12 5.4 12 12-5.4 12-12 12z"/></svg>
            <svg class="gear-final w-16 h-16 -bottom-4 -right-4" style="animation-direction:reverse;" viewBox="0 0 100 100"><path d="M50 30c-11 0-20 9-20 20s9 20 20 20 20-9 20-20-9-20-20-20zm0 32c-6.6 0-12-5.4-12-12s5.4-12 12-12 12 5.4 12 12-5.4 12-12 12z"/></svg>
            <div id="qw" class="text-6xl md:text-8xl font-black text-slate-900 tracking-tighter drop-shadow-sm"></div>
        </div>
        <div id="cg" class="grid grid-cols-1 gap-5 w-full max-w-md mx-auto"></div>
    </div>

    <div id="ov" class="hidden fixed inset-0 bg-slate-950/98 z-[100] flex flex-col p-6 overflow-y-auto">
        <div id="rc" class="w-full max-w-md mx-auto text-center py-10"></div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwpwalZph2UDQA8L6ojCNygSyUmbzziO9SutgfUGLJKl6Ak_Kxda5FFnC1VyeBQT8De8g/exec";
    
    let curCat = 'stage'; 
    let curMode = ''; 
    let pName = "";
    let score = 0;
    let qIdx = 0;
    let isActive = false;
    let qStart = 0;
    let qs = [];

    const M_CONF = {
        stage1: { img: 'st1.png', title: 'ステージ vol.1', endless: false },
        stage2: { img: 'st2.png', title: 'ステージ vol.2', endless: false },
        endless1: { img: 'ed1.png', title: 'エンドレス vol.1', endless: true },
        endless2: { img: 'ed2.png', title: 'エンドレス vol.2', endless: true }
    };

    function showInst(cat) {
        curCat = cat;
        document.getElementById('ts').classList.add('hidden');
        const s = document.getElementById('is');
        const t = document.getElementById('it');
        const b = document.getElementById('ib');
        s.classList.remove('hidden');
        
        if(cat === 'stage') {
            t.textContent = "遊び方";
            t.className = "text-5xl font-black text-emerald-400 mb-10";
            b.innerHTML = `
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">1</span><p>対義語を4択から選んでください。</p></div>
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">2</span><p>全60問。1問のミスで即終了です。</p></div>
                <div class="flex items-start gap-4"><span class="bg-emerald-500 text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">3</span><p>回答速度でスコアが変動します！</p></div>`;
        } else {
            t.textContent = "エンドレス";
            t.className = "text-5xl font-black text-blue-400 mb-10";
            b.innerHTML = `
                <div class="flex items-start gap-4"><span class="bg-blue-500 text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">1</span><p>対義語を4択から選んでください。</p></div>
                <div class="flex items-start gap-4"><span class="bg-blue-500 text-slate-900 w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">2</span><p>全200問をランダムに出題します。</p></div>`;
        }
    }

    function showVolSel() {
        document.getElementById('is').classList.add('hidden');
        const c = document.getElementById('vbc');
        c.innerHTML = '';
        const modes = curCat === 'stage' ? ['stage1', 'stage2'] : ['endless1', 'endless2'];
        modes.forEach(m => {
            const b = document.createElement('button');
            b.className = "active:scale-95 transition-all";
            b.onclick = () => { curMode = m; document.getElementById('vs').classList.add('hidden'); document.getElementById('ns').classList.remove('hidden'); };
            b.innerHTML = `<img src="${M_CONF[m].img}" alt="${M_CONF[m].title}" class="w-full drop-shadow-xl">`;
            c.appendChild(b);
        });
        document.getElementById('vs').classList.remove('hidden');
    }

    function startGame() {
        pName = document.getElementById('pn').value.trim();
        if(!pName) return alert("なまえをおしえて！");
        document.getElementById('ns').classList.add('hidden');
        document.getElementById('gs').classList.remove('hidden');
        
        const data = curMode.endsWith('2') ? DATA_NEW : DATA_OLD;
        if(M_CONF[curMode].endless) {
            const all = [...data.elementary, ...data.intermediate, ...data.advanced, ...data.extra];
            qs = all.sort(() => Math.random() - 0.5).slice(0, 200);
        } else {
            qs = [
                ...data.elementary.sort(() => Math.random() - 0.5).slice(0, 15),
                ...data.intermediate.sort(() => Math.random() - 0.5).slice(0, 15),
                ...data.advanced.sort(() => Math.random() - 0.5).slice(0, 15),
                ...data.extra.sort(() => Math.random() - 0.5).slice(0, 15)
            ];
        }
        score = 0; qIdx = 0; isActive = true;
        showQ();
    }

    function showQ() {
        if(qIdx >= qs.length) return end(true);
        const q = qs[qIdx];
        document.getElementById('qn').textContent = qIdx + 1;
        document.getElementById('ts-score').textContent = Math.floor(score);
        document.getElementById('qw').textContent = q.q;
        
        const choices = [q.a, ...q.d].sort(() => Math.random() - 0.5);
        const g = document.getElementById('cg');
        g.innerHTML = '';
        choices.forEach(t => {
            const b = document.createElement('button');
            b.className = "choice-btn w-full py-6 text-3xl font-black";
            b.textContent = t;
            b.onclick = () => check(t);
            g.appendChild(b);
        });
        qStart = Date.now();
    }

    function check(t) {
        if(!isActive) return;
        const q = qs[qIdx];
        if(t === q.a) {
            const sec = (Date.now() - qStart) / 1000;
            // 現行の得点ロジック：10秒以内の速さに応じてボーナス
            let bonus = Math.max(1, 10 - sec);
            score += 100 * bonus;
            pop(true);
            qIdx++;
            setTimeout(showQ, 600);
        } else {
            isActive = false;
            pop(false);
            setTimeout(() => end(false), 800);
        }
    }

    async function end(clear) {
        isActive = false;
        document.getElementById('gs').classList.add('hidden');
        const ov = document.getElementById('ov');
        const rc = document.getElementById('rc');
        ov.classList.remove('hidden');

        const finalScore = Math.floor(score);
        const r = TITLES.getRank(finalScore);
        const title = TITLES.wordA[r][Math.floor(Math.random() * TITLES.wordA[r].length)] + 
                      TITLES.wordB[r][Math.floor(Math.random() * TITLES.wordB[r].length)];

        rc.innerHTML = `
            <div class="bg-slate-800/80 backdrop-blur-2xl rounded-[50px] p-10 shadow-2xl border-4 border-slate-700 relative overflow-hidden">
                <p class="text-emerald-400 font-black text-2xl mb-4 tracking-widest uppercase">${clear ? 'All Clear!' : 'Game Over'}</p>
                <div class="text-8xl font-black text-white mb-8 italic drop-shadow-lg">${finalScore}</div>
                <div class="bg-slate-900/60 rounded-3xl p-6 mb-10 border border-slate-700">
                    <p class="text-slate-500 font-bold text-sm mb-2">獲得した称号</p>
                    <div class="text-3xl font-black text-amber-400 drop-shadow-sm">${title}</div>
                </div>
                <div id="rl" class="mb-10 text-left min-h-[200px]">
                    <p class="text-center text-slate-500 animate-pulse py-10 font-bold">ランキング通信中...</p>
                </div>
                <button onclick="location.reload()" class="w-full py-8 bg-gradient-to-r from-slate-600 to-slate-700 text-white rounded-3xl font-black text-3xl shadow-2xl active:scale-95 transition-all">トップに戻る</button>
            </div>
        `;

        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ name: pName, score: finalScore, mode: curMode })
            });
            const data = await res.json();
            showRank(data);
        } catch (e) {
            document.getElementById('rl').innerHTML = '<p class="text-center text-red-400 py-10 font-bold">通信エラーが発生しました</p>';
        }
    }

    function showRank(data) {
        const rl = document.getElementById('rl');
        let h = '<h3 class="text-center font-black text-slate-400 mb-6 tracking-widest text-xl underline decoration-emerald-500 decoration-4 underline-offset-8">全国ランキング</h3><div class="space-y-3 max-h-80 overflow-y-auto px-2">';
        data.forEach(x => {
            const isMe = x.name === pName && x.score === Math.floor(score);
            h += `
                <div class="flex items-center justify-between p-4 rounded-2xl ${isMe ? 'bg-emerald-500/20 border-2 border-emerald-500/50' : 'bg-slate-900/50 border border-slate-800'}">
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-mono font-bold ${isMe ? 'text-emerald-400' : 'text-slate-600'}">#${x.rank}</span>
                        <span class="font-black text-xl ${isMe ? 'text-emerald-400' : 'text-slate-200'}">${x.name}</span>
                    </div>
                    <span class="font-mono font-black text-2xl ${isMe ? 'text-emerald-400' : 'text-slate-400'}">${x.score}</span>
                </div>`;
        });
        rl.innerHTML = h + '</div>';
    }

    function pop(c) {
        const d = document.createElement('div');
        d.className = "feedback-pop text-9xl font-black";
        d.textContent = c ? "○" : "×";
        d.style.color = c ? "#10b981" : "#ef4444";
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 800);
    }

    function showInstall() {
        const ov = document.getElementById('ov');
        const rc = document.getElementById('rc');
        ov.classList.remove('hidden');
        const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        rc.innerHTML = `
            <div class="bg-slate-800/90 backdrop-blur-2xl rounded-[50px] p-10 border-4 border-slate-700 shadow-2xl">
                <h2 class="text-3xl font-black text-white mb-8">アプリとして保存</h2>
                <div class="text-left space-y-6 text-slate-300 text-lg">
                    ${isiOS ? 
                        `<div class="flex gap-4"><span class="bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">1</span><p>下の共有ボタンをタップ</p></div>
                         <div class="flex gap-4"><span class="bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">2</span><p>「ホーム画面に追加」を選択</p></div>` :
                        `<div class="flex gap-4"><span class="bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">1</span><p>右上のメニュー（⋮）をタップ</p></div>
                         <div class="flex gap-4"><span class="bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">2</span><p>「アプリをインストール」を選択</p></div>`
                    }
                </div>
                <button onclick="document.getElementById('ov').classList.add('hidden')" class="mt-10 w-full py-6 bg-slate-700 text-white rounded-3xl font-black text-2xl">閉じる</button>
            </div>
        `;
    }

// --- 以下、データ流し込み用 ---
// --- ランク・称号設定 ---
const TITLES_CONFIG = {
    // スコアに応じたランク決定（A～Eの5段階）
    getRank: (score) => {
        if (score >= 15000) return 'A';
        if (score >= 10000) return 'B';
        if (score >= 5000)  return 'C';
        if (score >= 1000)  return 'D';
        return 'E';
    },
    // 文吾オリジナルの単語群
    wordA: {
        A: ["鼻血が出そうな", "お湯も沸かせる", "味が濃すぎる", "地球を救いそうな", "牛乳を吹き出す", "目がバッキバキの", "100点満点を超えた", "止まると死ぬ", "お祭り騒ぎの", "筋肉痛になりそうな", "稲妻が走る", "本気を出しすぎた", "奇跡しか起きない", "絶好調すぎる", "燃えさかる", "声がデカすぎる", "夢にまで出てくる", "宇宙まで飛んでいく", "完璧に仕上がった", "神がかり的な", "爆笑を誘う", "まばたきを忘れた", "画面が割れそうな", "磁石のように吸い付く", "100年に一度の", "勢いが止まらない", "誰にも止められない", "太陽より熱い", "伝説になりそうな", "息継ぎなしの"],
        B: ["脂が乗ってきた", "おかわりが欲しい", "ノリにノっている", "鼻歌まじりの", "準備万端な", "歯切れの良い", "結構やる気な", "ドヤ顔がすぎる", "勢いがある", "ちょっと自慢げな", "期待を裏切らない", "かなりキマっている", "独自のキレがある", "油断ならない", "本気を出しかけた", "絶妙なタイミングの", "噂になりそうな", "磨けば光る", "安定感のある", "独自の進化をした", "声高らかな", "手応えバッチリの", "確信に満ちた", "意外と強気な", "独自のセンスが光る", "一味ちがう", "自信満々な", "スピードに乗った", "キラキラしている", "ちょうど食べごろな"],
        C: ["そこそこやる", "クラスで3番目の", "絶妙にふつうの", "意外と頑張る", "腹八分目の", "安定した", "ほどよい温度の", "どこにでもいる", "平均的な", "無難すぎる", "まあまあの", "どっちつかずの", "パッとしない", "ほどほどに温まった", "右へならえの", "標準的な", "可もなく不可もない", "世渡り上手な", "適当にこなす", "世間並みの", "ほどよく焼けた", "馴染みのある", "ど真ん中を行く", "箸休めのような", "まあま後の出来の", "それなりの", "目立たない", "安定の", "ちょうど真ん中の", "普通を極めた"],
        D: ["伸びしろしかない", "寝起きの", "よちよちの", "迷走している", "震える足の", "産まれたての", "おぼつかない", "崖っぷちの", "頼りない", "初々しい", "危なっかしい", "心もとない", "彷徨っている", "弱気な", "控えめな", "遠慮がちな", "借りてきた猫のような", "半信半疑の", "おそるおそるの", "手探りな", "未熟な", "幼い", "甘噛みの", "へっぴり腰の", "自信なげな", "霧の中にいるような", "ぼんやりした", "お腹をこわした", "忘れ物をした", "宿題が嫌いな"],
        E: ["ほぼ寝ている", "止まったままの", "ぐにゃぐにゃな", "お腹がすいた", "ぼーっとした", "穴のあいた", "すべって転んだ", "宿題を忘れた", "忘れ物ばかりの", "歯をみがいていない", "迷子になった", "自信のない", "まだ準備中の", "弱々しい", "まばたきしすぎた", "鼻歌まじりの", "ぼんやりした", "ふらふらの", "夢の中の", "ぼーっとしている", "お菓子を食べたい", "ぬるくなった", "頼りない", "影のうすい", "眠気に負けた", "風に流された", "名前を忘れた", "足がしびれた", "ぼけっとしている", "魂が抜けた"]
